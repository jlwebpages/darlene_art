<!DOCTYPE html>

<html>

<head>
   <title>Darlene Laguna Art - About</title>
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <link href="styles.css" rel="stylesheet" type="text/css">
   <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
   <script language="JavaScript" src=scripts.js></script>
</head>

<body class="body" oncontextmenu="return false;">


<script>

   write_header();

   document.getElementById("about_link").className = "clicked_header_link";

   document.writeln('<div id="about_header" class="header_link" style="text-align: center; margin-bottom: 5px; display: none">About</div>');

</script>

<div class="about_container">

   <div class="about_image_container">
      <img class="about_image" src="./about/about.jpg">
   </div>

   <div id="about_text" class="about_text">
      <!-- Load data from file. -->
   </div>

   <div id="exhibitions" class="exhibition_text">
      <!-- Load data from file. -->
   </div>

</div>

<script>

   var URL_string            = window.location.search;
   var URL_parameters        = new URLSearchParams(URL_string);
   var gallery_name          = "";
   var mode                  = URL_parameters.get("mode");
   var scroll_to_exhibitions = false;


   if (mode == "exhibitions") scroll_to_exhibitions = true;

   load_data_from_file(gallery_name,"about/about.txt","about_text",true,scroll_to_exhibitions);

   write_footer();

</script>


</body>

</html>
