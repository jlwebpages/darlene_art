<!DOCTYPE html>

<html>

<head>
   <title>Darlene Laguna Art - Contact</title>
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <link href="styles.css" rel="stylesheet" type="text/css">
   <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
   <script language="JavaScript" src=scripts.js></script>
</head>

<body class="body" onload="set_size_and_position_of_contact_page_elements();" oncontextmenu="return false;">


<script>

   var about_contact             = false;
   var email_message_placeholder = "Interested in this piece? To inquire about pricing or if you have any other questions, just type your message here and send the email. I will respond promptly.";
   var email_subject             = "Subject:&nbsp;&nbsp;";
   var html_file_name            = "";
   var html_path_segments        = "";
   var image_file_name           = "";
   var image_title               = "";
   var URL_parameters            = new URLSearchParams(window.location.search);


   image_file_name    = URL_parameters.get("image_file_name");
   image_title        = URL_parameters.get("image_title");
   html_path_segments = window.location.pathname.split('/');
   html_file_name     = html_path_segments[html_path_segments.length - 1];

   if ( (image_file_name == null) || (image_file_name == "") )
   {
      alert("Error:\n\nImage File Name not passed to " + html_file_name);

      if (history.length > 1)
      {
         history.back();
      }
      else
      {
         window.close();
      }
   }

   if (image_title == null)
   {
      alert("Error:\n\nImage Title not passed to " + html_file_name);

      if (history.length > 1)
      {
         history.back();
      }
      else
      {
         window.close();
      }
   }

   email_subject += image_title;

   if (image_title == "") about_contact = true;

   if (about_contact == true)
   {
      email_subject             += "Darlene Laguna Art";
      email_message_placeholder  = "Type your message here...";
   }

   write_header();

   document.getElementById("contact_link").className = "clicked_header_link";

   document.writeln('');
   document.writeln('<div id="contact_header" class="header_link" style="text-align: center; margin-bottom: 10px; display: none">Contact</div>');
   document.writeln('');
   document.writeln('<div class="contact_container">');
   document.writeln('');
   document.writeln('   <div class="contact_image_container">');
   document.writeln('      <div id="image_container" style="display: inline-block">');
   document.writeln('         <img id="contact_image" class="contact_image border_radius" src="'+image_file_name+'">');
   document.writeln('      </div>');
   document.writeln('   </div>');
   document.writeln('');
   document.writeln('   <div class="contact_email_container">');
   if (about_contact == true)
   {
      document.writeln('      <span id="contact_text" class="contact_text">');
      document.writeln('         Use the form below for more information and details about purchasing, pricing, and framing options.');
      document.writeln('         If you are in the Orange County area, we can arrange for you to view the art in person.');
      document.writeln('         I can also provide detailed photos for any piece. Please join my email list to receive updates about new art,');
      document.writeln('         upcoming events, and exhibitions. Thank you for your interest!');
      document.writeln('      </span>');
   }
   document.writeln('      <span id="contact_email_subject" class="contact_email_subject">'+email_subject+'</span>');
   document.writeln('      <textarea id="contact_email_message" class="contact_email_message" placeholder="'+email_message_placeholder+'"></textarea>');
   document.writeln('      <div id="checkbox_container" style="dislay: block; margin: 0px auto">');
   document.writeln('         <label for="contact_email_checkbox" id="contact_email_checkbox_label" class="contact_email_checkbox_label">');
   document.writeln('            <input id="contact_email_checkbox" type=checkbox class="contact_email_checkbox">&nbsp;&nbsp;Join email list');
   document.writeln('         </label>');
   document.writeln('      </div>');
   document.writeln('      <span id="contact_email_send_button" class="contact_email_send_button" onclick="send_contact_email()">Send</span>');
   document.writeln('   </div>');
   document.writeln('');
   document.writeln('</div>');
   document.writeln('');
   document.writeln('<button id="nav_left"  class="nav_button nav_left_offset"  style="background-color: black" onclick="update_contact_image(\''+image_file_name+'\',\'left\'); "><div class="nav_left_shape"  style="border-right: 10.5px solid white"></div></button>');
   document.writeln('<button id="nav_right" class="nav_button nav_right_offset" style="background-color: black" onclick="update_contact_image(\''+image_file_name+'\',\'right\');"><div class="nav_right_shape" style="border-left:  10.5px solid white"></div></button>');
   document.writeln('');

   write_footer();

   // Perform a hard reload when the device window orientation changes.

   window.addEventListener("orientationchange", function() {location.href = self.location.href;});

   // Connect keyboard keys to navigation buttons.

   document.addEventListener("keydown",(event) => {if (event.key == "ArrowLeft")  document.getElementById("nav_left" ).click();});
   document.addEventListener("keydown",(event) => {if (event.key == "ArrowRight") document.getElementById("nav_right").click();});

</script>


</body>

</html>
